version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: deploys/Dockerfile
    container_name: omvital-app
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    expose:
      - "3000"
    networks:
      - omvital-network

  nginx:
    image: nginx:alpine
    container_name: omvital-nginx
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - omvital-network

networks:
  omvital-network:
    driver: bridge
